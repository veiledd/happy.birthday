<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Happy Birthday ♡!!</title>

  <!-- Gothic fonts -->
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English:wght@400&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'UnifrakturCook', cursive;
      color: #ff1a1a;
      text-align: center;
    }

    /* FULL SCREEN PULSING BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;

      background: radial-gradient(circle at center,
        #b30000 0%,
        #5c0000 40%,
        #2a0000 75%,
        #120000 100%);

      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { filter: brightness(0.85); }
      50%  { filter: brightness(1.5); }
      100% { filter: brightness(0.85); }
    }

    /* Make content sit above background */
    h1, .button, .letter {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      padding-top: 10vh;
      font-size: clamp(34px, 6vw, 72px);
      text-shadow: 0 0 28px rgba(255,20,20,0.9);
      line-height: 1;
    }

    .button {
      margin-top: 5vh;
      padding: 16px 36px;
      font-size: 18px;
      background: rgba(0,0,0,0.65);
      color: #ff2a2a;
      border: 2px solid #ff2a2a;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(2px);
    }

    .button:hover {
      background: #ff2a2a;
      color: #080808;
      box-shadow: 0 0 24px rgba(255,20,20,0.7);
    }

    .letter {
      display: none;
      margin: 40px auto;
      width: min(900px, 86%);
      background: linear-gradient(180deg, #2a0000 0%, #3b0000 40%, #1b0000 100%);
      color: #fff6e6;
      padding: 36px;
      border: 3px solid #b80f0f;
      box-shadow: 0 0 40px rgba(180,10,10,0.45) inset, 0 10px 30px rgba(0,0,0,0.7);
      font-family: 'IM Fell English', serif;
      animation: fadeIn 1s ease forwards;
      line-height: 1.7;
      font-size: 18px;
      transform: rotate(-0.6deg);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96) rotate(-1deg); }
      to   { opacity: 1; transform: scale(1) rotate(-0.6deg); }
    }

    @media (max-width: 600px) {
      h1 { padding-top: 8vh; font-size: 36px; }
      .button { padding: 12px 20px; }
      .letter { padding: 20px; font-size: 16px; width: 92%; }
    }
  </style>
</head>

<body>

  <!-- ONLY ONE BACKGROUND DIV -->
  <div class="bg" id="bg"></div>

  <h1>HAPPY BIRTHDAY 🩸</h1>

  <button class="button"
          onmouseover="speedUpHeartbeat()"
          onmouseout="slowHeartbeat()"
          onclick="openLetter()">
    !! Open Your Letter
  </button>

  <div class="letter" id="birthdayLetter">
    <h2>To My Forever!</h2>
    <p>Dear Vlad! ...</p>
    <p>...</p>
    <p>— Yours Truly</p>
  </div>

  <script>
    function openLetter() {
      document.getElementById("birthdayLetter").style.display = "block";
      document.getElementById("birthdayLetter")
        .scrollIntoView({behavior: "smooth", block: "center"});
    }

    const bg = document.getElementById("bg");

    function speedUpHeartbeat() {
      bg.style.animationDuration = "0.6s";
    }

    function slowHeartbeat() {
      bg.style.animationDuration = "1.2s";
    }
  </script>

</body>
</html>
