<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Happy Birthday ♡!!</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English:wght@400&display=swap" rel="stylesheet">

<style>
html,body{
  height:100%; margin:0; overflow:hidden;
  background:#000; color:#ff1a1a;
  font-family:'UnifrakturCook',cursive;
}

/* =========================
   STAGE SYSTEM
========================= */
.stage { position:fixed; inset:0; display:none; }
.active { display:block; }

/* =========================
   MEMORY GAME
========================= */
#minigame{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:linear-gradient(#000,#120000);
  gap:18px;
}

#memoryText{
  font-family:'IM Fell English',serif;
  color:#ff9b9b;
  background:rgba(40,0,0,0.3);
  padding:12px 16px;
  border-radius:10px;
}

.opt-btn{
  background:#000; color:#ffb3b3;
  border:2px solid #7a0b0b;
  padding:10px 14px;
  cursor:pointer;
}

/* =========================
   BOSS ARENA
========================= */
#bossArena{
  background: radial-gradient(circle at center,#2a0000,#000);
}

#arena{
  position:absolute; inset:0;
  overflow:hidden;
}

/* player */
#player{
  width:18px; height:18px;
  background:#fff;
  position:absolute;
  border-radius:3px;
}

/* boss heart */
#boss{
  width:90px; height:90px;
  position:absolute;
  left:50%; top:20%;
  transform:translate(-50%,-50%);
  font-size:70px;
  animation:bossPulse 1.2s infinite;
}

@keyframes bossPulse{
  0%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.2)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

/* attacks */
.bullet{
  width:10px; height:10px;
  background:#ff1a1a;
  position:absolute;
  border-radius:50%;
}

/* UI */
#dialogue{
  position:absolute; bottom:20px;
  width:100%;
  text-align:center;
  font-family:'IM Fell English',serif;
  color:#ffb3b3;
}

/* =========================
   LETTER (UNCHANGED FEEL)
========================= */
#letter{
  display:none;
  padding:40px;
  max-width:800px;
  margin:auto;
  color:#fff6e6;
  font-family:'IM Fell English',serif;
  line-height:1.7;
}
.fade-line{ opacity:0; transform:translateY(10px); display:block; transition:.7s; }

</style>
</head>

<body>

<!-- STAGES -->
<div id="minigame" class="stage active">
  <div id="memoryText">Loading...</div>
  <div id="choices"></div>
</div>

<div id="bossArena" class="stage">
  <div id="arena">
    <div id="boss">♡</div>
    <div id="player"></div>
  </div>
  <div id="dialogue">...</div>
</div>

<div id="letter" class="stage">
  <h2 class="fade-line">To My Forever,</h2>
  <span class="fade-line">Dear Vlad! I’m 555 and you’re my 666...</span>
  <span class="fade-line">I keep replaying that night...</span>
  <span class="fade-line">You feel like a pulse I follow...</span>
  <span class="fade-line">I’ll be here. Steady. Yours.</span>
</div>

<script>

/* =========================
   STAGE SWITCH
========================= */
function show(stage){
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  document.getElementById(stage).classList.add('active');
}

/* =========================
   MEMORY GAME (simplified hook)
========================= */
setTimeout(()=>{
  show('bossArena'); // skip directly for testing flow
  startBoss();
}, 3000);

/* =========================
   BOSS FIGHT SYSTEM
========================= */
const player = document.getElementById('player');
const boss = document.getElementById('boss');
const dialogue = document.getElementById('dialogue');

let px=200, py=300;
let bullets=[];
let hp=3;

document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowUp') py-=10;
  if(e.key==='ArrowDown') py+=10;
  if(e.key==='ArrowLeft') px-=10;
  if(e.key==='ArrowRight') px+=10;

  player.style.left=px+'px';
  player.style.top=py+'px';
});

function talk(text){
  dialogue.innerText=text;
}

/* boss patterns */
function attack(){
  for(let i=0;i<12;i++){
    let b=document.createElement('div');
    b.className='bullet';
    b.style.left='50%';
    b.style.top='20%';
    document.getElementById('arena').appendChild(b);

    let angle=(Math.PI*2*i)/12;
    let speed=3;

    bullets.push({el:b, x:300, y:100, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed});
  }
}

function loop(){
  bullets.forEach(b=>{
    b.x+=b.vx;
    b.y+=b.vy;
    b.el.style.left=b.x+'px';
    b.el.style.top=b.y+'px';

    if(Math.abs(b.x-px)<15 && Math.abs(b.y-py)<15){
      hp--;
      talk("…you were touched.");
      if(hp<=0){
        restartBoss();
      }
    }
  });

  requestAnimationFrame(loop);
}

/* =========================
   FLOW
========================= */
function startBoss(){
  talk("The heart wakes.");
  setInterval(attack, 2000);
  loop();
}

function restartBoss(){
  hp=3;
  px=200; py=300;
  bullets.forEach(b=>b.el.remove());
  bullets=[];
  talk("Again. Try again.");
}

/* WIN CONDITION (demo shortcut) */
setTimeout(()=>{
  show('letter');
  revealLetter();
}, 20000);

/* =========================
   LETTER REVEAL
========================= */
function revealLetter(){
  document.querySelectorAll('.fade-line').forEach((l,i)=>{
    setTimeout(()=>l.style.opacity=1, i*600);
  });
}

</script>

</body>
</html>
